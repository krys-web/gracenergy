<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar" id="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo-container">
            <div class="logo-mock">
                <img src="img/logo.png" alt="Logo Gracenergy" class="logo-img">
            </div>
        </a>
        <nav class="nav-menu" id="nav-menu">
            <a href="index.html" class="nav-link" data-key="nav-home">Inicio</a>
            <a href="aplicaciones.html" class="nav-link" data-key="nav-applications">Aplicaciones</a>
            <a href="nosotros.html" class="nav-link" data-key="nav-about">Nosotros</a>
            <a href="soluciones.html" class="nav-link" data-key="nav-solutions">Soluciones</a>
            <a href="productos.html" class="nav-link" data-key="nav-products">Productos</a>
            <a href="catalogos.html" class="nav-link" data-key="nav-catalogos">Catálogos</a>
            <a href="contacto.html" class="nav-link" data-key="nav-contact">Contactos</a>
        </nav>
        
        <div class="search-container">
            <form id="global-search-form" autocomplete="off">
                <input type="text" id="search-input" placeholder="Buscar..." required>
                <button type="submit" id="search-btn">🔍</button>
            </form>
            <div id="search-results-dropdown" class="search-results-box"></div>
        </div>

        <div class="lang-selector">
            <button class="lang-btn" id="lang-btn">🌐 <span id="lang-text">EN</span></button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Abrir menú">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>
    
    <section id="contacto" class="contact-section section-padding">
        <div class="container small-container">
            <div class="section-header">
                <h2>Solicitar Información</h2>
                <div class="bar"></div>
            </div>

            <form class="contact-form" id="infoForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Christian Chávez">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" required placeholder="ejemplo@dominio.com">
                </div>
                <div class="form-group">
                    <label for="asunto">Asunto</label>
                    <input type="text" id="asunto" name="asunto" required placeholder="¿En qué solución está interesado?">
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje o Requerimiento</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Escriba los detalles de su solicitud aquí..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Enviar Solicitud</button>
            </form>
        </div>
    </section>

<script src="app.js"></script>
</body>
</html>
